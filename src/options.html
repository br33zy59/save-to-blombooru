<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <style>
    :root {
      color-scheme: light dark;
    }

    html,
    body {
      background: Canvas;
      color: CanvasText;
    }

    .field {
      margin-bottom: 1em;
    }

    .field label {
      display: block;
      margin-bottom: 0.35em;
    }

    .field input[type="url"],
    .field input[type="text"],
    .field input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      background: Field;
      color: FieldText;
      border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
      border-radius: 4px;
      padding: 6px 8px;
    }

    .field input::placeholder {
      color: GrayText;
    }

    .server-card {
      margin-bottom: 1em;
      padding: 1em;
      border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
      border-radius: 6px;
    }

    .rating-control {
      display: flex;
      align-items: center;
      gap: 0.5em;
    }

    .rating-control .rating-select {
      flex: 1;
      min-width: 0;
    }

    .server-remove {
      flex-shrink: 0;
      width: 2em;
      height: 2em;
      padding: 0;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: light-dark(#d70022, #ff8484);
      font-size: 1.25em;
      line-height: 1;
      cursor: pointer;
    }

    .server-remove:hover {
      background: color-mix(in srgb, #d70022 12%, transparent);
    }

    .field-status {
      margin: 0.35em 0 0;
      min-height: 1.2em;
      font-size: 0.95em;
    }

    .field-status.success {
      color: light-dark(#058b00, #72e06a);
    }

    .field-status.error {
      color: light-dark(#d70022, #ff8484);
    }

    .field-status.info {
      color: GrayText;
    }

    .server-row {
      display: flex;
      gap: 0.75em;
      margin-bottom: 0.75em;
    }

    .server-row .field {
      flex: 1;
      min-width: 0;
      margin-bottom: 0;
    }

    .field .api-key {
      display: none !important;
    }

    .upload-auth-hint {
      margin: 0;
      font-size: 0.72em;
      line-height: 1.35;
      color: GrayText;
    }

    .upload-auth-hint a {
      color: LinkText;
    }

    .server-status-block {
      margin-top: 0.25em;
    }

    .server-status-block .field-status {
      margin-bottom: 0.35em;
    }

    .server-status-block--permission-required {
      margin-top: 0.35em;
      padding: 0.75em 1em;
      border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
      border-radius: 0.5em;
      background: color-mix(in srgb, Canvas 92%, Highlight 8%);
    }

    .field-status.permission-required {
      color: light-dark(#c62828, #ff8a80);
      font-weight: 600;
      animation: permission-required-pulse 1.2s ease-in-out infinite;
    }

    @keyframes permission-required-pulse {
      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .field-status.permission-required {
        animation: none;
      }
    }

    .grant-access {
      margin-top: 0;
    }

    .rating-select {
      box-sizing: border-box;
      background: Field;
      color: FieldText;
      border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
      border-radius: 4px;
      padding: 6px 8px;
    }

    .settings-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1em;
      margin-top: 1em;
    }

    .save-button-wrap.save-blocked {
      cursor: not-allowed;
    }

    .save-button-wrap.save-blocked #save {
      pointer-events: none;
    }

    #save:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #save.saved {
      font-weight: 600;
    }

    #status {
      margin-top: 0.75em;
      min-height: 1.2em;
    }

    #status.success {
      color: light-dark(#058b00, #72e06a);
    }

    #status.error {
      color: light-dark(#d70022, #ff8484);
    }

    #removeServerDialog {
      max-width: 22em;
      padding: 0;
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      border-radius: 8px;
      background: Canvas;
      color: CanvasText;
    }

    #removeServerDialog::backdrop {
      background: color-mix(in srgb, CanvasText 35%, transparent);
    }

    #removeServerDialog form {
      margin: 0;
      padding: 1em;
    }

    #removeServerDialog p {
      margin: 0 0 1em;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5em;
    }

  </style>
</head>
<body>
  <div id="serversList"></div>

  <div class="settings-toolbar">
    <button type="button" id="addServer" data-i18n="buttonAddServer"></button>
    <span id="saveButtonWrap" class="save-button-wrap">
      <button type="button" id="save" data-i18n="buttonSaveSettings"></button>
    </span>
  </div>
  <p id="status" aria-live="polite"></p>

  <dialog id="removeServerDialog">
    <form method="dialog">
      <p data-i18n="confirmRemoveServer"></p>
      <div class="dialog-actions">
        <button type="submit" value="cancel" data-i18n="buttonCancel"></button>
        <button type="submit" value="confirm" data-i18n="buttonRemoveServer"></button>
      </div>
    </form>
  </dialog>

  <template id="serverCardTemplate">
    <article class="server-card">
      <div class="server-row">
        <div class="field">
          <label data-i18n="labelServerAddress"></label>
          <input type="url" class="booru-url" data-i18n-placeholder="placeholderServerAddress">
        </div>
        <div class="field">
          <label data-i18n="labelFriendlyName"></label>
          <input type="text" class="friendly-name" data-i18n-placeholder="placeholderFriendlyName">
        </div>
      </div>

      <div class="server-row">
        <div class="field">
          <input type="password" class="api-key" autocomplete="off" tabindex="-1" aria-hidden="true">
          <p class="upload-auth-hint" aria-live="polite"></p>
        </div>
        <div class="field">
          <label data-i18n="labelDefaultRating"></label>
          <div class="rating-control">
            <select class="rating rating-select">
              <option value="safe" data-i18n="ratingSafe"></option>
              <option value="questionable" data-i18n="ratingQuestionable"></option>
              <option value="explicit" data-i18n="ratingExplicit"></option>
            </select>
            <button type="button" class="server-remove" data-i18n-title="buttonRemoveServer">×</button>
          </div>
        </div>
      </div>

      <div class="server-status-block">
        <p class="url-status field-status" aria-live="polite"></p>
        <button type="button" class="grant-access" data-i18n="buttonGrantAccess" hidden></button>
      </div>
    </article>
  </template>

  <script src="browser.js"></script>
  <script src="permissions.js"></script>
  <script src="i18n-ui.js"></script>
  <script src="auth.js"></script>
  <script src="servers.js"></script>
  <script src="options.js"></script>
</body>
</html>
