<!DOCTYPE html>

<html>

<head>

  <meta charset="utf-8">

  <meta name="color-scheme" content="light dark">

  <style>

    :root {

      color-scheme: light dark;

    }



    * {

      box-sizing: border-box;

    }



    html,

    body {

      margin: 0;

      width: 760px;

      min-width: 760px;

      max-width: 800px;

      overflow-x: hidden;

      overflow-y: auto;

      background: Canvas;

      color: CanvasText;

      font: message-box;

      font-size: 13px;

    }



    .popup-shell {

      display: flex;

      flex-direction: row;

      align-items: stretch;

      min-height: 100%;

    }



    .popup-sidebar {

      flex: 0 0 360px;

      width: 360px;

      display: flex;

      flex-direction: column;

      align-self: stretch;

      min-height: 0;

      border-right: 1px solid color-mix(in srgb, CanvasText 12%, transparent);

    }



    .popup-sidebar__setup {

      flex: 0 0 auto;

      border-bottom: 1px solid color-mix(in srgb, CanvasText 12%, transparent);

    }



    .popup-sidebar__setup .popup-section {

      padding: 6px 8px;

      border-bottom: 1px solid color-mix(in srgb, CanvasText 10%, transparent);

    }



    .popup-sidebar__setup .popup-section:last-child {

      border-bottom: none;

    }



    .popup-sidebar__setup .popup-section-title {

      margin: 0 0 4px;

    }



    .popup-sidebar__setup .settings-button {

      padding: 6px 8px;

      gap: 8px;

    }



    .popup-sidebar__setup .settings-button img {

      width: 20px;

      height: 20px;

    }



    .popup-sidebar__setup .server-links a {

      padding: 4px 6px;

    }



    .popup-sidebar__setup .server-links li + li {

      margin-top: 2px;

    }



    .gallery-hover-preview-pane {

      flex: 1 1 auto;

      min-height: 0;

      max-height: 420px;

      padding: 6px 8px;

      display: flex;

      align-items: center;

      justify-content: center;

    }



    .gallery-hover-preview-pane--history {

      align-items: stretch;

      justify-content: flex-start;

    }



    .transfer-history {

      display: flex;

      flex: 1 1 auto;

      flex-direction: column;

      width: 100%;

      min-height: 0;

      overflow: hidden;

    }



    .transfer-history[hidden] {

      display: none !important;

    }



    .transfer-history__title {

      margin: 0 0 6px;

      font-size: 11px;

      font-weight: 600;

      color: GrayText;

      text-transform: uppercase;

      letter-spacing: 0.04em;

    }



    .transfer-history__list {

      list-style: none;

      margin: 0;

      padding: 0;

      overflow: hidden;

    }



    .transfer-history__item {

      display: flex;

      align-items: center;

      gap: 6px;

      height: 32px;

      padding: 2px 0;

      border-bottom: 1px solid color-mix(in srgb, CanvasText 8%, transparent);

    }



    .transfer-history__item:last-child {

      border-bottom: none;

    }



    .transfer-history__thumb {

      width: 24px;

      height: 24px;

      object-fit: cover;

      border-radius: 3px;

      flex: 0 0 auto;

      background: color-mix(in srgb, CanvasText 6%, Canvas);

    }



    .transfer-history__thumb--broken {

      opacity: 0.35;

    }



    .transfer-history__url {

      flex: 1 1 auto;

      min-width: 0;

      font-size: 11px;

      overflow: hidden;

      text-overflow: ellipsis;

      white-space: nowrap;

      color: CanvasText;

    }



    .transfer-history__url a {

      color: LinkText;

      text-decoration: none;

    }



    .transfer-history__url a:hover {

      text-decoration: underline;

    }



    .transfer-history__size {

      flex: 0 0 auto;

      font-size: 10px;

      color: GrayText;

      white-space: nowrap;

    }



    .transfer-history__size[hidden] {

      display: none;

    }



    .transfer-history__status {

      flex: 0 0 auto;

      width: 18px;

      text-align: center;

      font-size: 12px;

      line-height: 1;

    }



    .transfer-history__status--pending {

      display: inline-block;

      animation: transfer-history-spin 0.9s linear infinite;

    }



    @keyframes transfer-history-spin {

      to {

        transform: rotate(360deg);

      }

    }



    .transfer-history__status--success {

      color: light-dark(#2e7d32, #81c784);

    }



    .transfer-history__status--failure {

      color: light-dark(#c62828, #ff8a80);

    }



    .transfer-history__empty {

      margin: 0;

      font-size: 11px;

      color: GrayText;

      text-align: center;

      padding: 16px 4px;

    }



    .transfer-history__footer {

      flex: 0 0 auto;

      margin-top: auto;

      padding-top: 6px;

      text-align: right;

    }



    .transfer-history__clear {

      margin: 0;

      padding: 0;

      border: none;

      background: none;

      font: inherit;

      font-size: 11px;

      color: LinkText;

      cursor: pointer;

      text-decoration: underline;

      text-underline-offset: 2px;

    }



    .transfer-history__clear:hover {

      color: ActiveText;

    }



    .transfer-history__clear:focus-visible {

      outline: 2px solid LinkText;

      outline-offset: 2px;

    }



    .transfer-history__clear[hidden] {

      display: none;

    }



    @media (prefers-reduced-motion: reduce) {

      .transfer-history__status--pending {

        animation: none;

      }

    }



    .gallery-hover-preview {

      display: none;

      flex-direction: column;

      align-items: center;

      justify-content: center;

      width: 100%;

      max-height: 100%;

    }



    .gallery-hover-preview--visible {

      display: flex;

    }



    .gallery-hover-preview__frame {

      display: flex;

      align-items: center;

      justify-content: center;

      width: 100%;

      overflow: hidden;

      border-radius: 6px;

      background: color-mix(in srgb, CanvasText 6%, Canvas);

    }



    .gallery-hover-preview__img {

      display: block;

      object-fit: contain;

      object-position: center;

    }



    .gallery-hover-preview__img[hidden] {

      display: none !important;

    }



    .gallery-hover-preview__img--broken {

      opacity: 0.35;

    }



    .gallery-hover-preview__video {

      display: block;

      object-fit: contain;

      object-position: center;

    }



    .gallery-hover-preview__video[hidden] {

      display: none !important;

    }



    .gallery-hover-preview__filename,

    .gallery-hover-preview__dimensions {

      margin: 0;

      max-width: 100%;

      font-size: 11px;

      line-height: 1.3;

      text-align: center;

      color: GrayText;

      word-break: break-all;

    }



    .gallery-hover-preview__filename {

      margin-top: 8px;

    }



    .gallery-hover-preview__dimensions {

      margin-top: 4px;

      font-variant-numeric: tabular-nums;

    }



    .gallery-hover-preview__filename[hidden],

    .gallery-hover-preview__dimensions[hidden] {

      display: none;

    }



    .popup-main {

      flex: 1 1 auto;

      min-width: 0;

      display: flex;

      flex-direction: column;

    }



    .popup {

      display: flex;

      flex-direction: column;

      gap: 0;

      padding: 0;

    }



    .popup-section {

      padding: 10px 12px;

      border-bottom: 1px solid color-mix(in srgb, CanvasText 12%, transparent);

    }



    .popup-section:last-child {

      border-bottom: none;

    }



    .popup-section-title {

      margin: 0 0 8px;

      font-size: 11px;

      font-weight: 600;

      text-transform: uppercase;

      letter-spacing: 0.03em;

      color: GrayText;

    }



    .settings-button {

      display: flex;

      align-items: center;

      gap: 10px;

      width: 100%;

      margin: 0;

      padding: 8px 10px;

      border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);

      border-radius: 6px;

      background: Field;

      color: FieldText;

      font: inherit;

      text-align: left;

      cursor: pointer;

    }



    .settings-button:hover {

      background: color-mix(in srgb, CanvasText 6%, Field);

    }



    .settings-button img {

      flex-shrink: 0;

      width: 24px;

      height: 24px;

    }



    .server-links {

      margin: 0;

      padding: 0;

      list-style: none;

    }



    .server-links li + li {

      margin-top: 4px;

    }



    .server-links a {

      display: block;

      padding: 6px 8px;

      border-radius: 4px;

      color: LinkText;

      text-decoration: none;

      word-break: break-all;

    }



    .server-links a:hover {

      background: color-mix(in srgb, CanvasText 8%, transparent);

      text-decoration: underline;

    }



    .popup-empty {

      margin: 0;

      color: GrayText;

      font-size: 12px;

    }



    .page-media-status--host-retry {

      color: light-dark(#c62828, #ff8a80);

      font-weight: 600;

      animation: host-retry-pulse 1.2s ease-in-out infinite;

    }



    .page-media-status--host-retry a {

      color: inherit;

      text-decoration: underline;

    }



    @keyframes host-retry-pulse {

      0%,

      100% {

        opacity: 1;

      }



      50% {

        opacity: 0.5;

      }

    }



    @media (prefers-reduced-motion: reduce) {

      .page-media-status--host-retry,

      .media-cell--host-retry {

        animation: none;

      }

    }



    .popup-section.popup-page-media {

      overflow: visible;

      padding: 6px 10px 8px;

      border-bottom: none;

    }



    .popup-section.popup-page-media .popup-section-title {

      margin: 0 0 4px;

    }



    .gallery-toolbar {

      display: flex;

      flex-direction: column;

      gap: 4px;

      margin-bottom: 4px;

    }



    .gallery-toolbar[hidden] {

      display: none !important;

    }



    .gallery-toolbar__row {

      display: flex;

      flex-wrap: wrap;

      gap: 6px 10px;

      align-items: flex-end;

    }



    .gallery-toolbar__field {

      display: flex;

      flex-direction: column;

      gap: 2px;

      min-width: 0;

      flex: 1 1 130px;

    }



    .gallery-toolbar__label {

      font-size: 10px;

      font-weight: 600;

      text-transform: uppercase;

      letter-spacing: 0.03em;

      color: GrayText;

    }



    .gallery-toolbar__details {

      position: relative;

      width: 100%;

    }



    .gallery-toolbar__summary {

      list-style: none;

    }



    .gallery-toolbar__summary::-webkit-details-marker {

      display: none;

    }



    .gallery-toolbar__select {

      width: 100%;

      margin: 0;

      padding: 5px 8px;

      border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);

      border-radius: 4px;

      background: Field;

      color: FieldText;

      font: inherit;

      font-size: 12px;

      text-align: left;

      cursor: pointer;

    }



    .gallery-toolbar__menu {

      position: absolute;

      z-index: 50;

      left: 0;

      right: 0;

      margin-top: 2px;

      padding: 4px;

      border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);

      border-radius: 4px;

      background: Field;

      color: FieldText;

      box-shadow: 0 4px 12px color-mix(in srgb, CanvasText 25%, transparent);

      max-height: 200px;

      overflow: auto;

    }



    .gallery-toolbar__menu-item {

      display: block;

      width: 100%;

      margin: 0;

      padding: 6px 8px;

      border: 0;

      border-radius: 3px;

      background: transparent;

      color: inherit;

      font: inherit;

      font-size: 12px;

      text-align: left;

      cursor: pointer;

    }



    .gallery-toolbar__menu-item:hover,

    .gallery-toolbar__menu-item:focus-visible {

      background: color-mix(in srgb, CanvasText 10%, transparent);

    }



    .gallery-toolbar__menu-item--active {

      font-weight: 600;

      background: color-mix(in srgb, CanvasText 8%, transparent);

    }



    .gallery-toolbar__menu-item:disabled {

      color: GrayText;

      opacity: 0.65;

      cursor: not-allowed;

    }



    .gallery-toolbar__menu-item:disabled:hover,

    .gallery-toolbar__menu-item:disabled:focus-visible {

      background: transparent;

    }



    .gallery-toolbar__count {

      margin: 0;

      font-size: 11px;

      color: GrayText;

    }



    .gallery-toolbar__count[hidden] {

      display: none;

    }



    .page-media-host {

      overflow: auto;

      max-height: 400px;

    }



    .page-media-grid {

      display: grid;

      grid-template-columns: repeat(3, minmax(0, 1fr));

      gap: 10px;

    }



    .media-cell {

      position: relative;

      display: flex;

      flex-direction: column;

      align-items: stretch;

      min-width: 0;

      padding: 4px;

      border: 1px solid color-mix(in srgb, CanvasText 14%, transparent);

      border-radius: 6px;

      background: color-mix(in srgb, CanvasText 4%, Canvas);

      cursor: pointer;

    }



    .media-thumb-wrap {

      position: relative;

      display: flex;

      align-items: center;

      justify-content: center;

      width: 100%;

      min-height: 88px;

      height: 88px;

      overflow: hidden;

      border-radius: 4px;

      background: color-mix(in srgb, CanvasText 8%, transparent);

    }



    .media-choice-overlay {

      position: absolute;

      inset: 0;

      z-index: 3;

      display: none;

      flex-direction: row;

      align-items: stretch;

      background: color-mix(in srgb, #000 52%, transparent);

      color: #fff;

      border-radius: 4px;

    }



    .media-cell:hover .media-choice-overlay,

    .media-cell:focus-within .media-choice-overlay,

    .media-cell--show-choice .media-choice-overlay {

      display: flex;

    }



    .media-cell--host-retry {

      outline: 2px solid light-dark(#c62828, #ff8a80);

      outline-offset: 2px;

      animation: gallery-cell-host-retry-pulse 1.2s ease-in-out infinite;

    }



    @keyframes gallery-cell-host-retry-pulse {

      0%,

      100% {

        outline-color: light-dark(#c62828, #ff8a80);

        box-shadow: 0 0 0 0 transparent;

      }



      50% {

        outline-color: light-dark(#e53935, #ff5252);

        box-shadow: 0 0 0 4px light-dark(rgba(198, 40, 40, 0.35), rgba(255, 138, 128, 0.35));

      }

    }



    .media-upload-feedback {

      position: absolute;

      inset: 0;

      z-index: 4;

      display: none;

      align-items: center;

      justify-content: center;

      border-radius: 4px;

      background: color-mix(in srgb, #000 50%, transparent);

      color: #86efac;

      font-size: 1.1rem;

      font-weight: 700;

      pointer-events: none;

    }



    .media-upload-feedback--failure {

      color: #fca5a5;

    }



    .media-cell--upload-success .media-upload-feedback,

    .media-cell--upload-success .media-upload-feedback.media-upload-feedback--success,

    .media-cell--upload-failure .media-upload-feedback,

    .media-cell--upload-failure .media-upload-feedback.media-upload-feedback--failure {

      display: flex;

    }



    .media-choice-overlay--single {

      align-items: center;

      justify-content: center;

    }



    .media-choice-single {

      display: flex;

      align-items: center;

      justify-content: center;

      width: 100%;

      height: 100%;

      margin: 0;

      padding: 8px;

      border: none;

      background: transparent;

      color: inherit;

      font: inherit;

      font-size: 12px;

      line-height: 1.2;

      text-align: center;

      cursor: pointer;

    }



    .media-choice-single:hover,

    .media-choice-single:focus-visible {

      background: color-mix(in srgb, #fff 18%, transparent);

      outline: none;

    }



    .media-choice-half {

      flex: 1;

      display: flex;

      align-items: center;

      justify-content: center;

      min-width: 0;

      padding: 6px 4px;

      border: none;

      background: transparent;

      color: inherit;

      font: inherit;

      font-size: 10px;

      line-height: 1.15;

      text-align: center;

      white-space: nowrap;

      cursor: pointer;

    }



    .media-choice-half:hover,

    .media-choice-half:focus-visible {

      background: color-mix(in srgb, #fff 18%, transparent);

      outline: none;

    }



    .media-choice-divider {

      flex-shrink: 0;

      width: 1px;

      background: color-mix(in srgb, #fff 45%, transparent);

    }



    .media-thumb {

      display: block;

      max-width: 100%;

      max-height: 88px;

      width: auto;

      height: auto;

      object-fit: scale-down;

    }



    .media-thumb--broken {

      opacity: 0.35;

    }



    .media-kind-badge {

      position: absolute;

      right: 3px;

      bottom: 3px;

      padding: 0 4px;

      border-radius: 3px;

      background: color-mix(in srgb, Canvas 70%, CanvasText);

      font-size: 10px;

      line-height: 1.3;

    }



    .media-filename {

      margin-top: 4px;

      font-size: 10px;

      line-height: 1.25;

      text-align: center;

      word-break: break-all;

      color: GrayText;

    }



    /* Anchored to .media-cell (not position:fixed — clipped in Chromium extension popups). */

    .gallery-server-menu {

      position: absolute;

      left: 0;

      top: 100%;

      z-index: 200;

      width: max-content;

      min-width: 100%;

      max-width: min(360px, calc(100vw - 24px));

      margin: 4px 0 0;

      padding: 4px;

      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);

      border-radius: 6px;

      background: Canvas;

      color: CanvasText;

      box-shadow: 0 4px 16px color-mix(in srgb, CanvasText 25%, transparent);

    }



    .gallery-server-menu.gallery-server-menu--above {

      top: auto;

      bottom: 100%;

      margin: 0 0 4px;

    }



    .gallery-server-menu[hidden] {

      display: none !important;

    }



    .gallery-server-menu:not([hidden]) {

      display: block;

    }



    .gallery-server-menu-item {

      display: block;

      width: 100%;

      margin: 0;

      padding: 8px 10px;

      border: none;

      border-radius: 4px;

      background: transparent;

      color: inherit;

      font: inherit;

      font-size: 12px;

      text-align: left;

      cursor: pointer;

      white-space: nowrap;

    }



    .gallery-server-menu-item:hover,

    .gallery-server-menu-item:focus-visible {

      background: color-mix(in srgb, CanvasText 10%, transparent);

      outline: none;

    }



    .gallery-server-menu-item--on-page,

    .gallery-server-menu-item--on-page:disabled {

      color: GrayText;

      text-decoration: line-through;

      cursor: not-allowed;

      opacity: 0.85;

    }



    .gallery-server-menu-item--on-page:hover,

    .gallery-server-menu-item--on-page:focus-visible {

      background: transparent;

    }

  </style>

</head>

<body>

  <div class="popup-shell">

    <aside class="popup-sidebar">

      <div class="popup-sidebar__setup">

        <section class="popup-section popup-actions">

          <button type="button" id="openSettings" class="settings-button">

            <img src="icon.png" alt="">

            <span data-i18n="popupOpenSettings"></span>

          </button>

        </section>



        <section class="popup-section popup-servers" aria-labelledby="serversHeading">

          <h2 id="serversHeading" class="popup-section-title" data-i18n="popupServersHeading"></h2>

          <ul id="serverLinks" class="server-links" hidden></ul>

          <p id="noServers" class="popup-empty" data-i18n="popupNoServers" hidden></p>

        </section>

      </div>



      <div

        id="galleryHoverPreviewPane"

        class="gallery-hover-preview-pane gallery-hover-preview-pane--history"

        aria-label="Image preview"

      >
        <div id="transferHistory" class="transfer-history">
          <h3
            id="transferHistoryHeading"
            class="transfer-history__title"
            data-i18n="popupTransferHistoryHeading"
          ></h3>
          <ul id="transferHistoryList" class="transfer-history__list" hidden></ul>
          <p
            id="transferHistoryEmpty"
            class="transfer-history__empty"
            data-i18n="popupTransferHistoryEmpty"
            hidden
          ></p>
          <div class="transfer-history__footer">
            <button
              type="button"
              id="transferHistoryClear"
              class="transfer-history__clear"
              data-i18n="popupTransferHistoryClear"
              hidden
            ></button>
          </div>
        </div>

        <div id="galleryHoverPreview" class="gallery-hover-preview" hidden aria-hidden="true">
          <div id="galleryHoverPreviewFrame" class="gallery-hover-preview__frame">
            <img id="galleryHoverPreviewImg" class="gallery-hover-preview__img" alt="" decoding="async">
            <video id="galleryHoverPreviewVideo" class="gallery-hover-preview__video" hidden muted playsinline loop></video>
          </div>
          <p id="galleryHoverPreviewFilename" class="gallery-hover-preview__filename" hidden></p>
          <p id="galleryHoverPreviewDimensions" class="gallery-hover-preview__dimensions" hidden></p>
        </div>
      </div>

    </aside>

    <div class="popup-main">

      <div class="popup">

        <section

          class="popup-section popup-page-media"

          id="pageMediaSection"

          aria-labelledby="pageMediaHeading"

        >

          <h2 id="pageMediaHeading" class="popup-section-title" data-i18n="popupPageMediaHeading"></h2>

          <p id="pageMediaStatus" class="popup-empty" hidden></p>

          <div id="galleryToolbar" class="gallery-toolbar" hidden>
            <div class="gallery-toolbar__row">
              <div class="gallery-toolbar__field">
                <span class="gallery-toolbar__label" data-i18n="popupGalleryFilterLabel"></span>
                <details id="galleryFilterDetails" class="gallery-toolbar__details">
                  <summary id="galleryFilterSummary" class="gallery-toolbar__select gallery-toolbar__summary"></summary>
                  <div id="galleryFilterMenu" class="gallery-toolbar__menu" role="listbox"></div>
                </details>
              </div>
              <div class="gallery-toolbar__field">
                <span class="gallery-toolbar__label" data-i18n="popupGallerySortLabel"></span>
                <details id="gallerySortDetails" class="gallery-toolbar__details">
                  <summary id="gallerySortSummary" class="gallery-toolbar__select gallery-toolbar__summary"></summary>
                  <div id="gallerySortMenu" class="gallery-toolbar__menu" role="listbox"></div>
                </details>
              </div>
            </div>
            <p id="galleryItemCount" class="gallery-toolbar__count" hidden></p>
          </div>

          <div id="pageMediaHost" class="page-media-host"></div>

        </section>

      </div>

    </div>

  </div>

  <div id="galleryServerMenu" class="gallery-server-menu" role="menu" hidden></div>



  <script src="browser.js"></script>

  <script src="servers.js"></script>

  <script src="permissions.js"></script>

  <script src="i18n-ui.js"></script>

  <script src="tab-scripting.js"></script>

  <script src="transfer-history.js"></script>

  <script src="media-context.js"></script>

  <script src="popup.js"></script>

</body>

</html>
